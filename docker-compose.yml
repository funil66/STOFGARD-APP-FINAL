services:
  browserless:
    container_name: browserless
    image: browserless/chrome:1.61.1-chrome-stable
    restart: unless-stopped
    environment:
      - TOKEN=localtoken
      - MAX_CONCURRENT_SESSIONS=5
      - TIMEOUT=60000
    networks:
      - proxy_public
      - autonomia-public
  autonomia-site-legacy:
    container_name: autonomia-site-legacy
    image: php:8.4-apache
    command: >
      bash -lc "a2enmod headers rewrite && apache2-foreground"
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ${SITE_FINAL_PATH:-./external/SITE-FINAL}:/var/www/html:ro
    networks:
      - autonomia-public

  autonomia-stofgard:
    container_name: autonomia-stofgard
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ${STOFGARD_PATH:-./external/STOFGARD}:/usr/share/nginx/html:ro
    networks:
      - autonomia-public

  autonomia-marketing:
    container_name: autonomia-marketing
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./marketing-site:/usr/share/nginx/html:ro
      - ./marketing-site/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - autonomia-public

  autonomia-app:
    container_name: autonomia-app
    build:
      context: ${AUTONOMIA_APP_PATH:-.}
      dockerfile: deploy/Dockerfile
    env_file:
      - ${AUTONOMIA_ENV_FILE:-.env}
    volumes:
      - ./deploy/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    restart: unless-stopped
    ports:
      - "8004:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.autonomia-app.rule=Host(`autonomia.app.br`) || HostRegexp(`{subdomain:[a-z0-9-]+}.autonomia.app.br`)"
      - "traefik.http.routers.autonomia-app.entrypoints=websecure"
      - "traefik.http.routers.autonomia-app.tls.certresolver=cloudflare"
      - "traefik.http.services.autonomia-app.loadbalancer.server.port=80"
    networks:
      - proxy_public
      - autonomia-public

  mysql:
    container_name: autonomia-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-autonomia}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - proxy_public
      - autonomia-public

  redis:
    container_name: autonomia-redis
    image: redis:alpine
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass $$REDIS_PASSWORD;
      else
        redis-server;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - proxy_public
      - autonomia-public

networks:
  proxy_public:
    external: true
  autonomia-public:
    external: true
    name: autonomia-deploy_autonomia-public

volumes:
  mysql-data:
  redis-data:

