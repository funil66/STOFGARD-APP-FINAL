services:
  site-final:
    container_name: site-final
    image: php:8.4-apache
    command: >
      bash -lc "a2enmod headers rewrite && apache2-foreground"
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ${SITE_FINAL_PATH:-./external/SITE-FINAL}:/var/www/html:ro
    networks:
      - autonomia-public

  stofgard:
    container_name: stofgard
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ${STOFGARD_PATH:-./external/STOFGARD}:/usr/share/nginx/html:ro
    networks:
      - autonomia-public

  autonomia-marketing:
    container_name: autonomia-marketing
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./marketing-site:/usr/share/nginx/html:ro
      - ./marketing-site/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - autonomia-public

  autonomia-app:
    container_name: autonomia-app
    build:
      context: ${AUTONOMIA_APP_PATH:-.}
      dockerfile: deploy/Dockerfile
    env_file:
      - ${AUTONOMIA_ENV_FILE:-.env}
    command: >
      sh -lc "php artisan key:generate --force >/dev/null 2>&1 || true; php artisan config:clear >/dev/null 2>&1 || true; php artisan serve --host=0.0.0.0 --port=80"
    restart: unless-stopped
    ports:
      - "8004:80"
    networks:
      - autonomia-public

networks:
  autonomia-public:
    driver: bridge
