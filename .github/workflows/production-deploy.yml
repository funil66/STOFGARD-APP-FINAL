name: 🚀 Deploy de Produção Premium (Auto-Pilot)

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-app

jobs:
  build-and-push-image:
    name: 🏗️ Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: 🔐 Log in no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extrair metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: 🐳 Build and Push Docker image (App)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: 🚁 Deploy no Servidor (SSH)
    needs: build-and-push-image
    runs-on: ubuntu-latest

    steps:
      - name: 💣 Disparar Deploy na VPS (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # Caminho de produção do projeto
            cd /home/funil/dev/autonomia || cd /var/www/autonomia
            
            # Autenticar no GHCR no servidor para conseguir fazer o pull da imagem privada
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Fazer git pull caso haja alterações no docker-compose.yml ou confs
            git pull origin main
            
            # Puxar a nova imagem
            docker-compose pull
            
            # Subir o ambiente sem downtime e limpar o cache
            docker-compose up -d --remove-orphans
            
            # Executar otimizações finais
            docker exec autonomia-app php artisan optimize:clear
            docker exec autonomia-app php artisan tenants:migrate
